version: '3.9'

services:
  streampull:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: streampull
    restart: unless-stopped
    ports:
      - "8080:5000"        # Web UI accessible at http://localhost:8080
    volumes:
      - ./output:/output   # Downloaded videos land here
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/downloads"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  output:
